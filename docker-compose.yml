services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: xian
      POSTGRES_USER: xian
      POSTGRES_PASSWORD: xian
    ports: ["5432:5432"]
    volumes: ["xian-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xian"]
      interval: 3s
      timeout: 3s
      retries: 10
volumes:
  xian-data:
